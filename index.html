<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tasks</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; background: #F5F5F3; color: #1A1A1A; font-family: Arial, sans-serif; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #F5F5F3; }
  ::-webkit-scrollbar-thumb { background: #D0D0CC; border-radius: 2px; }
  input, textarea, select, button { font-family: Arial, sans-serif; }
  input[type=date]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.5; }
  .task-row > * { transition: background 0.1s; }
  .task-row:hover > * { background: #ECEAE6 !important; }
  .task-row:hover .task-actions { opacity: 1 !important; }
  .proj-tab { transition: background 0.1s; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .proj-tab:hover { background: #ECEAE6 !important; }
  input:focus, textarea:focus, select:focus { border-color: #2563EB !important; outline: none; }
  @media (max-width: 580px) {
    .sidebar { width: 155px !important; }
    .main-pad { padding: 12px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const SUPA_URL = "https://grokfifjcocujtgmeunl.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb2tmaWZqY29jdWp0Z21ldW5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NjcwNjMsImV4cCI6MjA5MTQ0MzA2M30.yftLoF6FgQCz2zMZyKHLGQ7s5VQfnXj8akUj6R3ArDs";
const H = { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}`, "Content-Type": "application/json" };

async function sbFetch(path, opts = {}) {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, { headers: H, ...opts });
  if (!res.ok) { const t = await res.text(); throw new Error(t); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

const db = {
  getProjects: () => sbFetch("projects?select=*&order=sort_order.asc"),
  getTasks:    () => sbFetch("tasks?select=*&order=created_at.asc"),
  insertTask:  (t) => sbFetch("tasks", { method:"POST", body: JSON.stringify({
    id: t.id, project_id: t.projectId, title: t.title, notes: t.notes||"",
    deadline: t.deadline||null, priority: t.priority, done: t.done
  })}),
  updateTask: (id, fields) => {
    const mapped = {};
    if ("done"      in fields) mapped.done       = fields.done;
    if ("title"     in fields) mapped.title      = fields.title;
    if ("notes"     in fields) mapped.notes      = fields.notes;
    if ("deadline"  in fields) mapped.deadline   = fields.deadline || null;
    if ("priority"  in fields) mapped.priority   = fields.priority;
    if ("projectId" in fields) mapped.project_id = fields.projectId;
    return sbFetch(`tasks?id=eq.${id}`, { method:"PATCH", body: JSON.stringify(mapped) });
  },
  deleteTask: (id) => sbFetch(`tasks?id=eq.${id}`, { method:"DELETE" }),
};

function fromRow(r) {
  return { id: r.id, projectId: r.project_id, title: r.title, notes: r.notes||"", deadline: r.deadline||null, priority: r.priority, done: r.done, createdAt: r.created_at };
}
function fromProjRow(r) {
  return { id: r.id, label: r.label, color: r.color, parentId: r.parent_id||null, sortOrder: r.sort_order };
}

function deadlineInfo(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + "T00:00:00");
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((d - now) / 86400000);
  const label = d.toLocaleDateString("en-US", { month:"short", day:"numeric" });
  if (diff < 0)   return { label:`${label} · overdue`, color:"#CC2200", urgent:true };
  if (diff === 0) return { label:"Due today",           color:"#CC2200", urgent:true };
  if (diff === 1) return { label:"Due tomorrow",        color:"#B06000", urgent:false };
  if (diff <= 7)  return { label:`${label} · ${diff}d`, color:"#B06000", urgent:false };
  return           { label,                             color:"#999",    urgent:false };
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function App() {
  const [projects, setProjects]     = useState([]);
  const [tasks, setTasks]           = useState([]);
  const [syncStatus, setSyncStatus] = useState("loading");
  const [activeProject, setActive]  = useState(null);
  const [showAdd, setShowAdd]       = useState(false);
  const [editId, setEditId]         = useState(null);
  const [form, setForm]             = useState({ title:"", notes:"", deadline:"", priority:"medium", projectId:"" });
  const [digest, setDigest]         = useState(null);
  const [digestLoading, setDL]      = useState(false);
  const [tab, setTab]               = useState("open");
  const [search, setSearch]         = useState("");
  const [inlineEditId, setInlineEditId]       = useState(null);
  const [inlineEditTitle, setInlineEditTitle] = useState("");
  const initialized                 = useRef(false);

  useEffect(() => {
    if (initialized.current) return;
    initialized.current = true;
    (async () => {
      try {
        const [pRows, tRows] = await Promise.all([db.getProjects(), db.getTasks()]);
        const projs = pRows.map(fromProjRow);
        setProjects(projs);
        setTasks(tRows.map(fromRow));
        if (projs.length) setForm(f => ({ ...f, projectId: projs[0].id }));
        setSyncStatus("ok");
      } catch(e) { setSyncStatus("error"); }
    })();
  }, []);

  const flash = (s) => setSyncStatus(s);

  const addTask = async (task) => {
    setTasks(prev => [...prev, task]);
    try { flash("saving"); await db.insertTask(task); flash("ok"); }
    catch { flash("error"); }
  };

  const updateTask = async (id, fields) => {
    setTasks(prev => prev.map(t => t.id === id ? { ...t, ...fields } : t));
    try { flash("saving"); await db.updateTask(id, fields); flash("ok"); }
    catch { flash("error"); }
  };

  const removeTask = async (id) => {
    setTasks(prev => prev.filter(t => t.id !== id));
    try { flash("saving"); await db.deleteTask(id); flash("ok"); }
    catch { flash("error"); }
  };

  const openAdd = (projectId) => {
    const pid = projectId || activeProject || (projects[0]?.id ?? "");
    setForm({ title:"", notes:"", deadline:"", priority:"medium", projectId: pid });
    setEditId(null); setShowAdd(true);
  };

  const openEdit = (task) => {
    setForm({ title:task.title, notes:task.notes||"", deadline:task.deadline||"", priority:task.priority, projectId:task.projectId });
    setEditId(task.id); setShowAdd(true);
  };

  const saveForm = () => {
    if (!form.title.trim()) return;
    if (editId) {
      updateTask(editId, { ...form, title:form.title.trim(), deadline:form.deadline||null });
    } else {
      addTask({ id:genId(), ...form, title:form.title.trim(), deadline:form.deadline||null, done:false, createdAt:new Date().toISOString() });
    }
    setShowAdd(false);
  };

  const saveInlineEdit = (id) => {
    if (inlineEditTitle.trim()) updateTask(id, { title: inlineEditTitle.trim() });
    setInlineEditId(null);
  };

  const proj = (id) => projects.find(p => p.id === id);

  const orderedProjects = [];
  projects.filter(p => !p.parentId).forEach(p => {
    orderedProjects.push(p);
    projects.filter(c => c.parentId === p.id).forEach(c => orderedProjects.push(c));
  });

  const filtered = tasks.filter(t => {
    const inProject = !activeProject || t.projectId === activeProject;
    const inTab     = tab === "open" ? !t.done : t.done;
    const inSearch  = !search || t.title.toLowerCase().includes(search.toLowerCase());
    return inProject && inTab && inSearch;
  });

  const grouped = activeProject
    ? { [activeProject]: filtered }
    : orderedProjects.reduce((acc, p) => {
        const items = filtered.filter(t => t.projectId === p.id);
        if (items.length) acc[p.id] = items;
        return acc;
      }, {});

  const openCount   = tasks.filter(t => !t.done).length;
  const urgentCount = tasks.filter(t => !t.done && t.deadline && deadlineInfo(t.deadline)?.urgent).length;

  const runDigest = async () => {
    setDL(true); setDigest(null);
    const open = tasks.filter(t => !t.done);
    const summary = orderedProjects.map(p => {
      const pts = open.filter(t => t.projectId === p.id);
      if (!pts.length) return null;
      return `**${p.label}** (${pts.length} open)\n` + pts.map(t => {
        const dl = t.deadline ? deadlineInfo(t.deadline) : null;
        return `- [${t.priority.toUpperCase()}] ${t.title}${dl ? ` (${dl.label})` : ""}`;
      }).join("\n");
    }).filter(Boolean).join("\n\n");
    if (!summary) { setDigest("🎉 No open tasks. Everything is done."); setDL(false); return; }
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:1000,
          messages:[{ role:"user", content:`You are a sharp executive assistant giving a crisp daily briefing. Here are the open tasks:\n\n${summary}\n\nGive a concise summary: start with what's most urgent (overdue/due soon), then flag any high-priority items, then give a quick project-by-project rundown. Be direct and brief — this is a scan, not a report. Use plain text, no markdown headers, keep it under 200 words.` }]
        })
      });
      const data = await res.json();
      setDigest(data.content?.[0]?.text || "No response.");
    } catch { setDigest("Couldn't reach AI."); }
    setDL(false);
  };

  const syncLabel = { loading:"⟳ connecting", saving:"⟳ saving", ok:"✓ synced", error:"✕ sync error" };
  const syncColor = { loading:"#AAA", saving:"#B06000", ok:"#2A7A4A", error:"#CC2200" };

  if (syncStatus === "loading") return (
    <div style={{ height:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#F5F5F3" }}>
      <div style={{ fontFamily:"Arial, sans-serif", fontSize:13, color:"#AAA", letterSpacing:2 }}>LOADING…</div>
    </div>
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:"#F5F5F3" }}>

      {/* Header */}
      <div style={{ borderBottom:"1px solid #DDDDD8", padding:"0 18px", display:"flex", alignItems:"center", justifyContent:"space-between", height:54, flexShrink:0, background:"#FFFFFF", position:"sticky", top:0, zIndex:50, boxShadow:"0 1px 0 #E8E8E4" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, minWidth:0 }}>
          <span style={{ fontFamily:"Arial, sans-serif", fontWeight:500, fontSize:15, letterSpacing:2, color:"#1A1A1A", flexShrink:0 }}>TASKS</span>
          {openCount > 0 && <span style={{ background:"#F0F0EC", borderRadius:20, padding:"2px 8px", fontSize:12, fontFamily:"Arial, sans-serif", color:"#888", flexShrink:0 }}>{openCount}</span>}
          {urgentCount > 0 && <span style={{ background:"#FFF0EE", border:"1px solid #FFCCC8", borderRadius:20, padding:"2px 8px", fontSize:12, fontFamily:"Arial, sans-serif", color:"#CC2200", flexShrink:0 }}>⚠ {urgentCount}</span>}
          <span style={{ fontSize:11, fontFamily:"Arial, sans-serif", color:syncColor[syncStatus], flexShrink:0 }}>{syncLabel[syncStatus]}</span>
        </div>
        <div style={{ display:"flex", gap:8, flexShrink:0 }}>
          <button onClick={runDigest} disabled={digestLoading}
            style={{ background:"#F0F0EC", border:"1px solid #DDDDD8", borderRadius:6, padding:"6px 12px", color:"#555", fontSize:12, cursor:"pointer", fontFamily:"Arial, sans-serif", letterSpacing:1 }}>
            {digestLoading ? "···" : "⚡ DIGEST"}
          </button>
          <button onClick={() => openAdd()}
            style={{ background:"#2563EB", border:"none", borderRadius:6, padding:"7px 15px", color:"#fff", fontSize:13, cursor:"pointer", fontWeight:500 }}>
            + Add
          </button>
        </div>
      </div>

      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>

        {/* Sidebar */}
        <div className="sidebar" style={{ width:190, borderRight:"1px solid #DDDDD8", padding:"14px 0", flexShrink:0, overflowY:"auto", background:"#FAFAF8" }}>
          <div style={{ padding:"0 14px 8px", fontSize:10, fontFamily:"Arial, sans-serif", color:"#AAA", letterSpacing:2 }}>PROJECTS</div>

          <div className="proj-tab" onClick={() => setActive(null)}
            style={{ padding:"8px 14px", background:activeProject===null?"#ECEAE6":"transparent", borderLeft:`2px solid ${activeProject===null?"#2563EB":"transparent"}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <span style={{ fontSize:14, color:activeProject===null?"#1A1A1A":"#666", fontWeight:activeProject===null?500:400 }}>All</span>
            {tasks.filter(t=>!t.done).length > 0 && <span style={{ fontSize:11, fontFamily:"Arial, sans-serif", color:"#AAA" }}>{tasks.filter(t=>!t.done).length}</span>}
          </div>

          {orderedProjects.map(p => {
            const isSub = !!p.parentId;
            const count = tasks.filter(t => !t.done && t.projectId === p.id).length;
            const active = activeProject === p.id;
            return (
              <div key={p.id} className="proj-tab" onClick={() => setActive(p.id)}
                style={{ padding:isSub?"6px 14px 6px 26px":"8px 14px", background:active?"#ECEAE6":"transparent", borderLeft:`2px solid ${active?p.color:"transparent"}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                  {isSub && <span style={{ color:"#CCC", fontSize:11 }}>└</span>}
                  <div style={{ width:isSub?5:6, height:isSub?5:6, borderRadius:"50%", background:p.color, flexShrink:0 }} />
                  <span style={{ fontSize:isSub?13:14, color:active?"#1A1A1A":(isSub?"#777":"#444"), fontWeight:active?500:400, lineHeight:1.3 }}>{p.label}</span>
                </div>
                {count > 0 && <span style={{ fontSize:11, fontFamily:"Arial, sans-serif", color:"#AAA" }}>{count}</span>}
              </div>
            );
          })}

          <div style={{ margin:"14px 14px 0", height:1, background:"#E8E8E4" }} />
          <div style={{ padding:"10px 14px 0", display:"flex", gap:4 }}>
            {["open","done"].map(t => (
              <button key={t} onClick={() => setTab(t)}
                style={{ flex:1, background:tab===t?"#ECEAE6":"transparent", border:"none", borderRadius:5, padding:"6px 0", fontSize:11, fontFamily:"Arial, sans-serif", color:tab===t?"#1A1A1A":"#AAA", cursor:"pointer", letterSpacing:1 }}>
                {t.toUpperCase()}
              </button>
            ))}
          </div>
        </div>

        {/* Main */}
        <div className="main-pad" style={{ flex:1, overflowY:"auto", padding:"18px 22px", background:"#F5F5F3" }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…"
            style={{ width:"100%", maxWidth:280, background:"#FFFFFF", border:"1px solid #DDDDD8", borderRadius:6, padding:"8px 12px", color:"#1A1A1A", fontSize:14, marginBottom:18, display:"block" }} />

          {digest && (
            <div style={{ background:"#EEF4FF", border:"1px solid #C0D4FF", borderRadius:8, padding:"14px 16px", marginBottom:18, position:"relative" }}>
              <div style={{ fontSize:10, fontFamily:"Arial, sans-serif", color:"#2563EB", letterSpacing:2, marginBottom:8 }}>⚡ DAILY DIGEST</div>
              <div style={{ fontSize:14, color:"#334", lineHeight:1.75, whiteSpace:"pre-wrap" }}>{digest}</div>
              <button onClick={()=>setDigest(null)} style={{ position:"absolute", top:10, right:12, background:"none", border:"none", color:"#AAA", cursor:"pointer", fontSize:20 }}>×</button>
            </div>
          )}

          {Object.keys(grouped).length === 0 && (
            <div style={{ textAlign:"center", paddingTop:60, color:"#CCC", fontFamily:"Arial, sans-serif", fontSize:12, letterSpacing:2 }}>
              {tab==="done" ? "NO COMPLETED TASKS" : "NO OPEN TASKS"}
              {tab==="open" && <div style={{ marginTop:12 }}><button onClick={()=>openAdd()} style={{ background:"none", border:"1px dashed #DDD", borderRadius:6, padding:"8px 16px", color:"#AAA", fontSize:13, cursor:"pointer" }}>+ Add your first task</button></div>}
            </div>
          )}

          {Object.entries(grouped).map(([pid, items]) => {
            const p = proj(pid);
            const sorted = [...items].sort((a,b) => {
              const pri = {high:0,medium:1,low:2};
              if (!a.deadline && !b.deadline) return pri[a.priority]-pri[b.priority];
              if (!a.deadline) return 1; if (!b.deadline) return -1;
              return new Date(a.deadline)-new Date(b.deadline);
            });
            return (
              <div key={pid} style={{ marginBottom:28 }}>
                {!activeProject && (
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                    <div style={{ width:7, height:7, borderRadius:"50%", background:p?.color }} />
                    <span style={{ fontSize:12, fontFamily:"Arial, sans-serif", color:"#555", letterSpacing:1.5, fontWeight:700 }}>{p?.label?.toUpperCase()}</span>
                    <div style={{ flex:1, height:1, background:"#E8E8E4" }} />
                    <button onClick={()=>openAdd(pid)} style={{ background:"none", border:"none", color:"#CCC", cursor:"pointer", fontSize:20, lineHeight:1, padding:"0 4px" }}
                      onMouseEnter={e=>e.target.style.color="#888"} onMouseLeave={e=>e.target.style.color="#CCC"}>+</button>
                  </div>
                )}
                <div style={{ display:"grid", gridTemplateColumns:"17px auto auto 1fr auto", columnGap:10, rowGap:0 }}>
                  <div />
                  <div style={{ padding:"0 0 6px", fontSize:10, color:"#BBB", letterSpacing:1.5 }}>TASK</div>
                  <div style={{ borderLeft:"1px dotted #DDDDD8", padding:"0 0 6px 12px", fontSize:10, color:"#BBB", letterSpacing:1.5 }}>DEADLINE</div>
                  <div /><div />
                  {sorted.map(task => {
                    const dl = task.deadline ? deadlineInfo(task.deadline) : null;
                    return (
                      <div key={task.id} className="task-row" style={{ display:"contents" }}>
                        <div style={{ padding:"9px 0", display:"flex", alignItems:"center" }}>
                          <div onClick={()=>updateTask(task.id,{done:!task.done})}
                            style={{ width:17, height:17, borderRadius:4, border:`1.5px solid ${task.done?"#2563EB":"#CCCCCA"}`, background:task.done?"#2563EB":"transparent", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.1s" }}>
                            {task.done && <span style={{ color:"#fff", fontSize:10, fontWeight:700 }}>✓</span>}
                          </div>
                        </div>
                        <div style={{ padding:"9px 0", display:"flex", flexDirection:"column", justifyContent:"center" }}>
                          {inlineEditId === task.id ? (
                            <input autoFocus value={inlineEditTitle}
                              onChange={e => setInlineEditTitle(e.target.value)}
                              onBlur={() => saveInlineEdit(task.id)}
                              onKeyDown={e => {
                                if (e.key === "Enter") { e.preventDefault(); saveInlineEdit(task.id); }
                                if (e.key === "Escape") setInlineEditId(null);
                              }}
                              style={{ fontSize:14, color:"#1A1A1A", background:"transparent", border:"none", borderBottom:"1px solid #2563EB", outline:"none", padding:0, fontFamily:"Arial, sans-serif" }}
                            />
                          ) : (
                            <span
                              onClick={() => { if (!task.done) { setInlineEditId(task.id); setInlineEditTitle(task.title); } }}
                              style={{ fontSize:14, color:task.done?"#BBBBBA":"#1A1A1A", textDecoration:task.done?"line-through":"none", cursor:task.done?"default":"text", whiteSpace:"nowrap" }}
                            >{task.title}</span>
                          )}
                          {task.notes && <div style={{ fontSize:12, color:"#999", marginTop:2, lineHeight:1.5 }}>{task.notes}</div>}
                        </div>
                        <div style={{ borderLeft:"1px dotted #DDDDD8", padding:"9px 0 9px 12px", display:"flex", alignItems:"center" }}>
                          {dl && !task.done && <span style={{ fontSize:14, color:dl.color, whiteSpace:"nowrap" }}>{dl.label}</span>}
                        </div>
                        <div />
                        <div className="task-actions" style={{ display:"flex", gap:2, opacity:0, transition:"opacity 0.1s", alignItems:"center" }}>
                          <button onClick={()=>openEdit(task)} style={{ background:"none", border:"none", color:"#AAA", cursor:"pointer", fontSize:13, padding:"2px 5px" }}>✎</button>
                          <button onClick={()=>removeTask(task.id)} style={{ background:"none", border:"none", color:"#CCC", cursor:"pointer", fontSize:13, padding:"2px 5px" }}>✕</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
                {activeProject && tab==="open" && (
                  <button onClick={()=>openAdd(pid)} style={{ marginTop:6, background:"none", border:"1px dashed #DDD", borderRadius:5, padding:"7px 10px", color:"#CCC", fontSize:13, cursor:"pointer", width:"100%", textAlign:"left" }}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor="#AAA";e.currentTarget.style.color="#888";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor="#DDD";e.currentTarget.style.color="#CCC";}}>
                    + Add task
                  </button>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* Modal */}
      {showAdd && (
        <div onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}
          style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:100 }}>
          <div style={{ background:"#FFFFFF", border:"1px solid #DDDDD8", borderRadius:"14px 14px 0 0", padding:"22px 20px 36px", width:"100%", maxWidth:520, boxShadow:"0 -4px 24px rgba(0,0,0,0.08)" }}>
            <div style={{ fontSize:10, fontFamily:"Arial, sans-serif", color:"#AAA", letterSpacing:2, marginBottom:16 }}>{editId?"EDIT TASK":"NEW TASK"}</div>
            <div style={{ display:"flex", flexDirection:"column", gap:11 }}>
              <input autoFocus value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))}
                onKeyDown={e=>e.key==="Enter"&&saveForm()} placeholder="Task title *"
                style={{ background:"#F5F5F3", border:"1px solid #DDDDD8", borderRadius:6, padding:"11px 12px", color:"#1A1A1A", fontSize:15 }} />
              <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Notes (optional)" rows={2}
                style={{ background:"#F5F5F3", border:"1px solid #DDDDD8", borderRadius:6, padding:"11px 12px", color:"#1A1A1A", fontSize:14, resize:"none" }} />
              <div style={{ display:"flex", gap:8 }}>
                <div style={{ flex:3 }}>
                  <div style={{ fontSize:10, fontFamily:"Arial, sans-serif", color:"#AAA", letterSpacing:1.5, marginBottom:5 }}>PROJECT</div>
                  <select value={form.projectId} onChange={e=>setForm(f=>({...f,projectId:e.target.value}))}
                    style={{ width:"100%", background:"#F5F5F3", border:"1px solid #DDDDD8", borderRadius:6, padding:"10px 9px", color:"#1A1A1A", fontSize:14 }}>
                    {orderedProjects.map(p=><option key={p.id} value={p.id}>{p.parentId?`  ↳ ${p.label}`:p.label}</option>)}
                  </select>
                </div>
                <div style={{ flex:2 }}>
                  <div style={{ fontSize:10, fontFamily:"Arial, sans-serif", color:"#AAA", letterSpacing:1.5, marginBottom:5 }}>PRIORITY</div>
                  <select value={form.priority} onChange={e=>setForm(f=>({...f,priority:e.target.value}))}
                    style={{ width:"100%", background:"#F5F5F3", border:"1px solid #DDDDD8", borderRadius:6, padding:"10px 9px", color:"#1A1A1A", fontSize:14 }}>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                  </select>
                </div>
              </div>
              <div>
                <div style={{ fontSize:10, fontFamily:"Arial, sans-serif", color:"#AAA", letterSpacing:1.5, marginBottom:5 }}>DEADLINE (optional)</div>
                <input type="date" value={form.deadline} onChange={e=>setForm(f=>({...f,deadline:e.target.value}))}
                  style={{ background:"#F5F5F3", border:"1px solid #DDDDD8", borderRadius:6, padding:"10px 12px", color:form.deadline?"#1A1A1A":"#AAA", fontSize:14, width:"100%" }} />
              </div>
            </div>
            <div style={{ display:"flex", gap:8, marginTop:18 }}>
              <button onClick={()=>setShowAdd(false)} style={{ flex:1, background:"#F5F5F3", border:"1px solid #DDDDD8", borderRadius:6, padding:"12px 0", color:"#888", fontSize:14, cursor:"pointer" }}>Cancel</button>
              <button onClick={saveForm} style={{ flex:2, background:"#2563EB", border:"none", borderRadius:6, padding:"12px 0", color:"#fff", fontSize:14, cursor:"pointer", fontWeight:500 }}>{editId?"Save Changes":"Add Task"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
