<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tasks</title>
<link rel="manifest" href="/tasks/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tasks">
<meta name="theme-color" content="#F5F5F3">
<link rel="apple-touch-icon" href="/tasks/icons/icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chrono-node@2/dist/chrono.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; background: #F5F5F3; color: #1A1A1A; font-family: Arial, sans-serif; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #F5F5F3; }
  ::-webkit-scrollbar-thumb { background: #D0D0CC; border-radius: 2px; }
  input, textarea, select, button { font-family: Arial, sans-serif; }
  input[type=date]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.5; }
  .task-row > * { transition: background 0.1s; }
  .task-row:hover > * { background: #ECEAE6 !important; }
  .task-row:hover .task-actions { opacity: 1 !important; }
  .task-row.selected > * { background: #EBF0FF !important; }
  .task-row.selected .task-actions { opacity: 1 !important; }
  .proj-tab { transition: background 0.1s; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .proj-tab:hover { background: #ECEAE6 !important; }
  input:focus, textarea:focus, select:focus { border-color: #2563EB !important; outline: none; }
  .sidebar { transition: transform 0.25s ease; }
  @media (max-width: 768px) {
    .sidebar {
      position: fixed !important;
      top: 54px; left: 0; bottom: 0;
      z-index: 100;
      transform: translateX(-100%);
      box-shadow: 4px 0 24px rgba(0,0,0,0.13);
      width: 220px !important;
    }
    .sidebar.open { transform: translateX(0); }
    .main-pad { padding: 14px !important; }
    .sidebar-backdrop {
      position: fixed; inset: 0; top: 54px;
      background: rgba(0,0,0,0.25);
      z-index: 99;
    }
    /* Prevent scroll chaining (rubber-band pulling outer viewport) */
    .main-pad { overscroll-behavior: contain; }
    .sidebar  { overscroll-behavior: contain; }
    /* Always show edit/delete buttons on touch devices */
    .task-actions { opacity: 1 !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const SUPA_URL = "https://grokfifjcocujtgmeunl.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb2tmaWZqY29jdWp0Z21ldW5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NjcwNjMsImV4cCI6MjA5MTQ0MzA2M30.yftLoF6FgQCz2zMZyKHLGQ7s5VQfnXj8akUj6R3ArDs";
const H = { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}`, "Content-Type": "application/json" };

async function sbFetch(path, opts = {}) {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, { headers: H, ...opts });
  if (!res.ok) { const t = await res.text(); throw new Error(t); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

const db = {
  getProjects: () => sbFetch("projects?select=*&order=sort_order.asc"),
  getTasks:    () => sbFetch("tasks?select=*&order=created_at.asc"),
  insertTask:  (t) => sbFetch("tasks", { method:"POST", body: JSON.stringify({
    id: t.id, project_id: t.projectId, title: t.title, notes: t.notes||"",
    deadline: t.deadline||null, priority: t.priority, done: t.done
  })}),
  updateTask: (id, fields) => {
    const mapped = {};
    if ("done"      in fields) mapped.done       = fields.done;
    if ("title"     in fields) mapped.title      = fields.title;
    if ("notes"     in fields) mapped.notes      = fields.notes;
    if ("deadline"  in fields) mapped.deadline   = fields.deadline || null;
    if ("priority"  in fields) mapped.priority   = fields.priority;
    if ("projectId" in fields) mapped.project_id = fields.projectId;
    return sbFetch(`tasks?id=eq.${id}`, { method:"PATCH", body: JSON.stringify(mapped) });
  },
  deleteTask: (id) => sbFetch(`tasks?id=eq.${id}`, { method:"DELETE" }),
};

function fromRow(r) {
  return { id: r.id, projectId: r.project_id, title: r.title, notes: r.notes||"", deadline: r.deadline||null, priority: r.priority, done: r.done, createdAt: r.created_at };
}
function fromProjRow(r) {
  return { id: r.id, label: r.label, color: r.color, parentId: r.parent_id||null, sortOrder: r.sort_order };
}

function deadlineInfo(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + "T00:00:00");
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((d - now) / 86400000);
  const label = d.toLocaleDateString("en-US", { month:"short", day:"numeric" });
  if (diff < 0)   return { label:`${label} · overdue`, color:"#CC2200", urgent:true };
  if (diff === 0) return { label:"Due today",           color:"#CC2200", urgent:true };
  if (diff === 1) return { label:"Due tomorrow",        color:"#B06000", urgent:false };
  if (diff <= 7)  return { label:`${label} · ${diff}d`, color:"#B06000", urgent:false };
  return           { label,                             color:"#999",    urgent:false };
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// Parse natural language or "mm/dd/yy" → { ok, iso } where iso is "YYYY-MM-DD" or null (clear)
function parseDateInput(str) {
  const s = str.trim();
  if (!s) return { ok: true, iso: null }; // empty = clear deadline
  // mm/dd/yy(yy) numeric shorthand
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (m) {
    let [, mo, dy, yr] = m;
    if (yr.length === 2) yr = "20" + yr;
    const iso = `${yr}-${mo.padStart(2,"0")}-${dy.padStart(2,"0")}`;
    if (isNaN(new Date(iso + "T00:00:00").getTime())) return { ok: false };
    return { ok: true, iso };
  }
  // Natural language via chrono-node
  if (typeof chrono !== "undefined") {
    const d = chrono.parseDate(s, new Date(), { forwardDate: true });
    if (d) {
      const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      return { ok: true, iso };
    }
  }
  return { ok: false };
}

function App() {
  const [projects, setProjects]     = useState([]);
  const [tasks, setTasks]           = useState([]);
  const [syncStatus, setSyncStatus] = useState("loading");
  const [activeProject, setActive]  = useState(null);
  const [showAdd, setShowAdd]       = useState(false);
  const [editId, setEditId]         = useState(null);
  const [form, setForm]             = useState({ title:"", notes:"", deadline:"", priority:"medium", projectId:"" });
  const [digest, setDigest]         = useState(null);
  const [digestLoading, setDL]      = useState(false);
  const [tab, setTab]               = useState("open");
  const [search, setSearch]         = useState("");
  const [inlineEditId, setInlineEditId]       = useState(null);
  const [inlineEditTitle, setInlineEditTitle] = useState("");
  const [showCmdK, setShowCmdK]       = useState(false);
  const [cmdKQuery, setCmdKQuery]     = useState("");
  const [cmdKIdx, setCmdKIdx]         = useState(0);
  const [selectedTaskId, setSelectedTaskId] = useState(null);
  const [showNewProj, setShowNewProj] = useState(false);
  const [newProjName, setNewProjName] = useState("");
  const [newProjColor, setNewProjColor] = useState("#2563EB");
  const [showShortcuts, setShowShortcuts] = useState(false);
  const [showDatePalette, setShowDatePalette] = useState(false);
  const [datePaletteVal, setDatePaletteVal]   = useState("");
  const [isMobile, setIsMobile] = useState(() => window.innerWidth <= 768);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const initialized                 = useRef(false);
  const flatRef                     = useRef([]);
  const selectedTaskRef             = useRef(null);
  const openEditRef                 = useRef(null);

  useEffect(() => {
    if (initialized.current) return;
    initialized.current = true;
    (async () => {
      try {
        const [pRows, tRows] = await Promise.all([db.getProjects(), db.getTasks()]);
        const projs = pRows.map(fromProjRow);
        setProjects(projs);
        setTasks(tRows.map(fromRow));
        if (projs.length) setForm(f => ({ ...f, projectId: projs[0].id }));
        setSyncStatus("ok");
      } catch(e) { setSyncStatus("error"); }
    })();
  }, []);

  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth <= 768);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  // Axis-lock touch scrolling on mobile: detect initial swipe direction,
  // then suppress the cross-axis component so you never scroll diagonally
  useEffect(() => {
    if (!isMobile) return;
    let startX, startY, axis;
    const THRESHOLD = 8; // px of movement before locking an axis
    const onStart = (e) => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      axis = null;
    };
    const onMove = (e) => {
      if (!axis) {
        const dx = Math.abs(e.touches[0].clientX - startX);
        const dy = Math.abs(e.touches[0].clientY - startY);
        if (dx > THRESHOLD || dy > THRESHOLD) {
          axis = dx > dy ? "x" : "y";
        } else return;
      }
      // Once locked, prevent cross-axis scrolling by stopping the event
      // when the opposite axis would dominate
      const dx = Math.abs(e.touches[0].clientX - startX);
      const dy = Math.abs(e.touches[0].clientY - startY);
      if ((axis === "x" && dy > dx) || (axis === "y" && dx > dy)) {
        e.preventDefault();
      }
    };
    document.addEventListener("touchstart", onStart, { passive: true });
    document.addEventListener("touchmove", onMove, { passive: false });
    return () => {
      document.removeEventListener("touchstart", onStart);
      document.removeEventListener("touchmove", onMove);
    };
  }, [isMobile]);

  useEffect(() => {
    const onKey = (e) => {
      const typing = ["INPUT","TEXTAREA","SELECT"].includes(document.activeElement?.tagName);
      // Ctrl+K — project switcher
      if (e.key === "k" && (e.ctrlKey || e.metaKey) && !e.shiftKey) {
        e.preventDefault();
        setShowAdd(false); setShowNewProj(false); setShowShortcuts(false);
        setShowCmdK(v => { if (!v) { setCmdKQuery(""); setCmdKIdx(0); } return !v; });
      }
      // N — new task (only when not typing, no overlay open)
      if (e.key === "n" && !typing && !e.ctrlKey && !e.metaKey && !showDatePalette) {
        e.preventDefault();
        setShowCmdK(false); setShowNewProj(false); setShowShortcuts(false);
        setShowAdd(true); setEditId(null);
        setForm(f => ({ ...f, title:"", notes:"", deadline:"", priority:"medium" }));
      }
      // P — new project (only when not typing, no overlay open)
      if (e.key === "p" && !typing && !e.ctrlKey && !e.metaKey && !showDatePalette) {
        e.preventDefault();
        setShowCmdK(false); setShowAdd(false); setShowShortcuts(false);
        setNewProjName(""); setNewProjColor("#2563EB");
        setShowNewProj(true);
      }
      // D — set deadline on selected task
      if (e.key === "d" && !typing && !showAdd && !showNewProj && !showCmdK && !showShortcuts && !showDatePalette) {
        const curId = selectedTaskRef.current;
        if (curId) { e.preventDefault(); setDatePaletteVal(""); setShowDatePalette(true); }
      }
      // ArrowDown — select next task (or first)
      if (e.key === "ArrowDown" && !typing && !showAdd && !showNewProj && !showCmdK && !showShortcuts && !showDatePalette) {
        e.preventDefault();
        const tasks = flatRef.current;
        setSelectedTaskId(cur => {
          if (!tasks.length) return null;
          const idx = tasks.findIndex(t => t.id === cur);
          return tasks[Math.min(idx + 1, tasks.length - 1)].id;
        });
      }
      // ArrowUp — select previous task
      if (e.key === "ArrowUp" && !typing && !showAdd && !showNewProj && !showCmdK && !showShortcuts && !showDatePalette) {
        e.preventDefault();
        const tasks = flatRef.current;
        setSelectedTaskId(cur => {
          if (!tasks.length) return null;
          const idx = tasks.findIndex(t => t.id === cur);
          return idx <= 0 ? tasks[0].id : tasks[idx - 1].id;
        });
      }
      // Enter — open edit for selected task
      if (e.key === "Enter" && !typing && !showAdd && !showNewProj && !showCmdK && !showShortcuts && !showDatePalette) {
        const curId = selectedTaskRef.current;
        if (curId) {
          const task = flatRef.current.find(t => t.id === curId);
          if (task) openEditRef.current(task);
        }
      }
      // Tab — toggle open/done (only when not typing)
      if (e.key === "Tab" && !typing && !e.ctrlKey && !e.metaKey && !showDatePalette) {
        e.preventDefault();
        setTab(t => t === "open" ? "done" : "open");
      }
      // ? — shortcuts help
      if (e.key === "?" && !typing && !showDatePalette) {
        setShowShortcuts(v => !v);
      }
      // Escape — close all overlays
      if (e.key === "Escape") {
        setShowCmdK(false); setShowAdd(false);
        setShowNewProj(false); setShowShortcuts(false); setShowDatePalette(false);
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  });

  const flash = (s) => setSyncStatus(s);

  const addTask = async (task) => {
    setTasks(prev => [...prev, task]);
    try { flash("saving"); await db.insertTask(task); flash("ok"); }
    catch { flash("error"); }
  };

  const updateTask = async (id, fields) => {
    setTasks(prev => prev.map(t => t.id === id ? { ...t, ...fields } : t));
    try { flash("saving"); await db.updateTask(id, fields); flash("ok"); }
    catch { flash("error"); }
  };

  const removeTask = async (id) => {
    setTasks(prev => prev.filter(t => t.id !== id));
    try { flash("saving"); await db.deleteTask(id); flash("ok"); }
    catch { flash("error"); }
  };

  const openAdd = (projectId) => {
    const pid = projectId || activeProject || (projects[0]?.id ?? "");
    setForm({ title:"", notes:"", deadline:"", priority:"medium", projectId: pid });
    setEditId(null); setShowAdd(true);
  };

  // Navigate to a project — also closes the sidebar on mobile
  const navTo = (id) => { setActive(id); setSelectedTaskId(null); setSidebarOpen(false); };

  const openEdit = (task) => {
    setForm({ title:task.title, notes:task.notes||"", deadline:task.deadline||"", priority:task.priority, projectId:task.projectId });
    setEditId(task.id); setShowAdd(true);
  };
  openEditRef.current = openEdit;

  const saveForm = () => {
    if (!form.title.trim()) return;
    if (editId) {
      updateTask(editId, { ...form, title:form.title.trim(), deadline:form.deadline||null });
    } else {
      addTask({ id:genId(), ...form, title:form.title.trim(), deadline:form.deadline||null, done:false, createdAt:new Date().toISOString() });
    }
    setShowAdd(false);
  };

  const createProject = async () => {
    if (!newProjName.trim()) return;
    const id = newProjName.trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    const maxOrder = Math.max(0, ...projects.map(p => p.sortOrder || 0));
    const payload = { id, label: newProjName.trim(), color: newProjColor, parent_id: null, sort_order: maxOrder + 1 };
    try {
      flash("saving");
      await sbFetch("projects", { method:"POST", body: JSON.stringify(payload) });
      setProjects(prev => [...prev, { id, label: newProjName.trim(), color: newProjColor, parentId: null, sortOrder: maxOrder + 1 }]);
      flash("ok");
    } catch { flash("error"); }
    setShowNewProj(false); setNewProjName("");
  };

  const saveInlineEdit = (id) => {
    if (inlineEditTitle.trim()) updateTask(id, { title: inlineEditTitle.trim() });
    setInlineEditId(null);
  };

  const proj = (id) => projects.find(p => p.id === id);

  const orderedProjects = [];
  projects.filter(p => !p.parentId).forEach(p => {
    orderedProjects.push(p);
    projects.filter(c => c.parentId === p.id).forEach(c => orderedProjects.push(c));
  });

  const filtered = tasks.filter(t => {
    const inProject = !activeProject || t.projectId === activeProject;
    const inTab     = tab === "open" ? !t.done : t.done;
    const inSearch  = !search || t.title.toLowerCase().includes(search.toLowerCase());
    return inProject && inTab && inSearch;
  });

  const grouped = activeProject
    ? { [activeProject]: filtered }
    : orderedProjects.reduce((acc, p) => {
        const items = filtered.filter(t => t.projectId === p.id);
        if (items.length) acc[p.id] = items;
        return acc;
      }, {});

  const sortFn = (a,b) => {
    const pri = {high:0,medium:1,low:2};
    if (!a.deadline && !b.deadline) return pri[a.priority]-pri[b.priority];
    if (!a.deadline) return 1; if (!b.deadline) return -1;
    return new Date(a.deadline)-new Date(b.deadline);
  };
  const flatSortedTasks = Object.values(grouped).flatMap(items => [...items].sort(sortFn));
  flatRef.current = flatSortedTasks;
  selectedTaskRef.current = selectedTaskId;

  useEffect(() => { setSelectedTaskId(null); }, [activeProject, tab]);
  useEffect(() => {
    if (selectedTaskId) {
      document.getElementById(`task-${selectedTaskId}`)?.scrollIntoView({ block:"nearest", behavior:"smooth" });
    }
  }, [selectedTaskId]);

  const openCount   = tasks.filter(t => !t.done).length;
  const urgentCount = tasks.filter(t => !t.done && t.deadline && deadlineInfo(t.deadline)?.urgent).length;

  const runDigest = async () => {
    setDL(true); setDigest(null);
    const open = tasks.filter(t => !t.done);
    const summary = orderedProjects.map(p => {
      const pts = open.filter(t => t.projectId === p.id);
      if (!pts.length) return null;
      return `**${p.label}** (${pts.length} open)\n` + pts.map(t => {
        const dl = t.deadline ? deadlineInfo(t.deadline) : null;
        return `- [${t.priority.toUpperCase()}] ${t.title}${dl ? ` (${dl.label})` : ""}`;
      }).join("\n");
    }).filter(Boolean).join("\n\n");
    if (!summary) { setDigest("🎉 No open tasks. Everything is done."); setDL(false); return; }
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:1000,
          messages:[{ role:"user", content:`You are a sharp executive assistant giving a crisp daily briefing. Here are the open tasks:\n\n${summary}\n\nGive a concise summary: start with what's most urgent (overdue/due soon), then flag any high-priority items, then give a quick project-by-project rundown. Be direct and brief — this is a scan, not a report. Use plain text, no markdown headers, keep it under 200 words.` }]
        })
      });
      const data = await res.json();
      setDigest(data.content?.[0]?.text || "No response.");
    } catch { setDigest("Couldn't reach AI."); }
    setDL(false);
  };

  const syncLabel = { loading:"⟳ connecting", saving:"⟳ saving", ok:"✓ synced", error:"✕ sync error" };
  const syncColor = { loading:"#AAA", saving:"#B06000", ok:"#2A7A4A", error:"#CC2200" };

  if (syncStatus === "loading") return (
    <div style={{ height:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#F5F5F3" }}>
      <div style={{ fontFamily:"Arial, sans-serif", fontSize:13, color:"#AAA", letterSpacing:2 }}>LOADING…</div>
    </div>
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:"#F5F5F3" }}>

      {/* Header */}
      <div style={{ borderBottom:"1px solid #DDDDD8", padding:"0 18px", display:"flex", alignItems:"center", justifyContent:"space-between", height:54, flexShrink:0, background:"#FFFFFF", position:"sticky", top:0, zIndex:50, boxShadow:"0 1px 0 #E8E8E4" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, minWidth:0 }}>
          {isMobile && (
            <button onClick={() => setSidebarOpen(v => !v)}
              style={{ background:"none", border:"none", cursor:"pointer", padding:"4px 6px 4px 0", display:"flex", flexDirection:"column", gap:4, flexShrink:0 }}>
              <span style={{ display:"block", width:18, height:2, background:"#555", borderRadius:1 }} />
              <span style={{ display:"block", width:18, height:2, background:"#555", borderRadius:1 }} />
              <span style={{ display:"block", width:18, height:2, background:"#555", borderRadius:1 }} />
            </button>
          )}
          <span style={{ fontFamily:"Arial, sans-serif", fontWeight:500, fontSize:15, letterSpacing:2, color:"#1A1A1A", flexShrink:0 }}>TASKS</span>
          {openCount > 0 && <span style={{ background:"#F0F0EC", borderRadius:20, padding:"2px 8px", fontSize:12, fontFamily:"Arial, sans-serif", color:"#888", flexShrink:0 }}>{openCount}</span>}
          {urgentCount > 0 && <span style={{ background:"#FFF0EE", border:"1px solid #FFCCC8", borderRadius:20, padding:"2px 8px", fontSize:12, fontFamily:"Arial, sans-serif", color:"#CC2200", flexShrink:0 }}>⚠ {urgentCount}</span>}
          <span style={{ fontSize:11, fontFamily:"Arial, sans-serif", color:syncColor[syncStatus], flexShrink:0 }}>{syncLabel[syncStatus]}</span>
        </div>
        <div style={{ display:"flex", gap:8, flexShrink:0 }}>
          <button onClick={runDigest} disabled={digestLoading}
            style={{ background:"#F0F0EC", border:"1px solid #DDDDD8", borderRadius:6, padding:"6px 12px", color:"#555", fontSize:12, cursor:"pointer", fontFamily:"Arial, sans-serif", letterSpacing:1 }}>
            {digestLoading ? "···" : "⚡ DIGEST"}
          </button>
          <button onClick={() => openAdd()}
            style={{ background:"#2563EB", border:"none", borderRadius:6, padding:"7px 15px", color:"#fff", fontSize:13, cursor:"pointer", fontWeight:500 }}>
            + Add
          </button>
        </div>
      </div>

      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>

        {/* Mobile backdrop — tap to close sidebar */}
        {isMobile && sidebarOpen && (
          <div className="sidebar-backdrop" onClick={() => setSidebarOpen(false)} />
        )}

        {/* Sidebar */}
        <div className={`sidebar${isMobile && sidebarOpen ? " open" : ""}`}

                  <span style={{ fontSize:isSub?13:14, color:active?"#1A1A1A":(isSub?"#777":"#444"), fontWeight:active?500:400, lineHeight:1.3 }}>{p.label}</span>
                </div>

          <div style={{ padding:"10px 14px 0", display:"flex", gap:4 }}>
            {["open","done"].map(t => (
              <button key={t} onClick={() => setTab(t)}
                style={{ flex:1, background:tab===t?"#ECEAE6":"transparent", border:"none", borderRadius:5, padding:"6px 0", fontSize:11, fontFamily:"Arial, sans-serif", color:tab===t?"#1A1A1A":"#AAA", cursor:"pointer", letterSpacing:1 }}>

              </button>

        </div>

        {/* Main */}
        <div className="main-pad" style={{ flex:1, overflowY:"auto", padding:"18px 22px", background:"#F5F5F3" }}>

            style={{ width:"100%", maxWidth:280, background:"#FFFFFF", border:"1px solid #DDDDD8", borderRadius:6, padding:"8px 12px", color:"#1A1A1A", fontSize:14, marginBottom:18, display:"block" }} />

          {digest && (
            <div style={{ background:"#EEF4FF", border:"1px solid #C0D4FF", borderRadius:8, padding:"14px 16px", marginBottom:18, position:"relative" }}>
              <div style={{ fontSize:10, fontFamily:"Arial, sans-serif", color:"#2563EB", letterSpacing:2, marginBottom:8 }}>⚡ DAILY DIGEST</div>
              <div style={{ fontSize:14, color:"#334", lineHeight:1.75, whiteSpace:"pre-wrap" }}>{digest}</div>
              <button onClick={()=>setDigest(null)} style={{ position:"absolute", top:10, right:12, background:"none", border:"none", color:"#AAA", cursor:"pointer", fontSize:20 }}>×</button>
            </div>
          )}

          {Object.keys(grouped).length === 0 && (
            <div style={{ textAlign:"center", paddingTop:60, color:"#CCC", fontFamily:"Arial, sans-serif", fontSize:12, letterSpacing:2 }}>
              {tab==="done" ? "NO COMPLETED TASKS" : "NO OPEN TASKS"}
              {tab==="open" && <div style={{ marginTop:12 }}><button onClick={()=>openAdd()} style={{ background:"none", border:"1px dashed #DDD", borderRadius:6, padding:"8px 16px", color:"#AAA", fontSize:13, cursor:"pointer" }}>+ Add your first task</button></div>}

            <div style={{ display:"grid", gridTemplateColumns:"27px auto auto 1fr", columnGap:0, rowGap:0 }}>
              {Object.entries(grouped).map(([pid, items], idx) => {
                const p = proj(pid);
                const sorted = [...items].sort((a,b) => {
                  const pri = {high:0,medium:1,low:2};
                  if (!a.deadline && !b.deadline) return pri[a.priority]-pri[b.priority];
                  if (!a.deadline) return 1; if (!b.deadline) return -1;
                  return new Date(a.deadline)-new Date(b.deadline);
                });
                return (
                  <React.Fragment key={pid}>
                    <div style={{ gridColumn:"1 / -1", display:"flex", alignItems:"center", gap:8, padding: idx > 0 ? "20px 0 8px" : "0 0 8px" }}>

                      <span style={{ fontSize:12, fontFamily:"Arial, sans-serif", color:"#555", letterSpacing:1.5, fontWeight:700 }}>{p?.label?.toUpperCase()}</span>
                      <div style={{ flex:1, height:1, background:"#E8E8E4" }} />
                      <button onClick={()=>openAdd(pid)} style={{ background:"none", border:"none", color:"#CCC", cursor:"pointer", fontSize:20, lineHeight:1, padding:"0 4px" }}

                    </div>
                    <div style={{ borderBottom:"1px solid #DDDDD8", padding:"0 0 6px" }} />
                    <div style={{ padding:"0 20px 6px 0", fontSize:14, color:"#1A1A1A", fontWeight:600, borderBottom:"1px solid #DDDDD8" }}>Task</div>
                    <div style={{ borderLeft:"1px dashed #DDDDD8", padding:"0 0 6px 12px", fontSize:14, color:"#1A1A1A", fontWeight:600, borderBottom:"1px solid #DDDDD8" }}>Deadline</div>
                    <div style={{ borderBottom:"1px solid #DDDDD8" }} />
                    {sorted.map(task => {
                      const dl = task.deadline ? deadlineInfo(task.deadline) : null;
                      const isSel = selectedTaskId === task.id;
                      const selBg = isSel ? "#EBF0FF" : undefined;
                      return (
                        <div key={task.id} className={`task-row${isSel?" selected":""}`} style={{ display:"contents" }} onClick={()=>isMobile ? openEdit(task) : setSelectedTaskId(task.id)}>
                          <div style={{ padding:"9px 10px 9px 0", display:"flex", alignItems:"center", background:selBg, transition:"background 0.1s" }}>
                            <div onClick={e=>{e.stopPropagation();updateTask(task.id,{done:!task.done})}}
                              style={{ width:17, height:17, borderRadius:4, border:`1.5px solid ${task.done?"#2563EB":"#CCCCCA"}`, background:task.done?"#2563EB":"transparent", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.1s" }}>
                              {task.done && <span style={{ color:"#fff", fontSize:10, fontWeight:700 }}>✓</span>}
                            </div>
                          </div>
                          <div id={`task-${task.id}`} style={{ padding:"9px 20px 9px 0", display:"flex", flexDirection:"column", justifyContent:"center", background:selBg, transition:"background 0.1s" }}>
                            {inlineEditId === task.id ? (
                              <input autoFocus value={inlineEditTitle}
                                onChange={e => setInlineEditTitle(e.target.value)}
                                onBlur={() => saveInlineEdit(task.id)}

                                  if (e.key === "Escape") setInlineEditId(null);

                              >{task.title}</span>

                            {task.notes && <div style={{ fontSize:12, color:"#999", marginTop:2, lineHeight:1.5 }}>{task.notes}</div>}
                          </div>
                          <div style={{ borderLeft:"1px dashed #DDDDD8", padding:"9px 0 9px 12px", display:"flex", alignItems:"center", background:selBg, transition:"background 0.1s" }}>
                            {dl && !task.done && <span style={{ fontSize:14, color:"#1A1A1A", whiteSpace:"nowrap" }}>{dl.label}</span>}
                          </div>
                          <div className="task-actions" style={{ display:"flex", gap:2, opacity:isSel?1:0, transition:"opacity 0.1s", alignItems:"center", paddingLeft:10, background:selBg }}>
                            <button onClick={()=>openEdit(task)} style={{ background:"none", border:"none", color:"#AAA", cursor:"pointer", fontSize:13, padding:"2px 5px" }}>✎</button>
                            <button onClick={()=>removeTask(task.id)} style={{ background:"none", border:"none", color:"#CCC", cursor:"pointer", fontSize:13, padding:"2px 5px" }}>✕</button>
                          </div>
                        </div>

                    })}
                  </React.Fragment>

              })}
            </div>
          )}

          {/* INDIVIDUAL PROJECT VIEW — per-project grid, deadline flush with cushion */}
          {activeProject && Object.entries(grouped).map(([pid, items]) => {
            const sorted = [...items].sort((a,b) => {
              const pri = {high:0,medium:1,low:2};
              if (!a.deadline && !b.deadline) return pri[a.priority]-pri[b.priority];
              if (!a.deadline) return 1; if (!b.deadline) return -1;
              return new Date(a.deadline)-new Date(b.deadline);

            return (
              <div key={pid} style={{ marginBottom:28 }}>
                <div style={{ display:"grid", gridTemplateColumns:"27px auto auto 1fr", columnGap:0, rowGap:0 }}>

                          <div onClick={e=>{e.stopPropagation();updateTask(task.id,{done:!task.done})}}
                            style={{ width:17, height:17, borderRadius:4, border:`1.5px solid ${task.done?"#2563EB":"#CCCCCA"}`, background:task.done?"#2563EB":"transparent", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.1s" }}>
                            {task.done && <span style={{ color:"#fff", fontSize:10, fontWeight:700 }}>✓</span>}
                          </div>
                        </div>
                        <div id={`task-${task.id}`} style={{ padding:"9px 20px 9px 0", display:"flex", flexDirection:"column", justifyContent:"center" }}>
                          {inlineEditId === task.id ? (
                            <input autoFocus value={inlineEditTitle}
                              onChange={e => setInlineEditTitle(e.target.value)}
                              onBlur={() => saveInlineEdit(task.id)}
                              onKeyDown={e => {
                                if (e.key === "Enter") { e.preventDefault(); saveInlineEdit(task.id); }
                                if (e.key === "Escape") setInlineEditId(null);
                              }}
                              style={{ fontSize:14, color:"#1A1A1A", background:"transparent", border:"none", borderBottom:"1px solid #2563EB", outline:"none", padding:"0 0 0 1px", margin:0, width:"100%", display:"block", boxSizing:"border-box", fontFamily:"Arial, sans-serif" }}
                            />
                          ) : (
                            <span
                              onClick={e => { if (!isMobile && !task.done) { e.stopPropagation(); setInlineEditId(task.id); setInlineEditTitle(task.title); } }}
                              style={{ fontSize:14, color:task.done?"#BBBBBA":"#1A1A1A", textDecoration:task.done?"line-through":"none", cursor:task.done?"default":"text", whiteSpace:"nowrap" }}
                            >{task.title}</span>
                          )}
                          {task.notes && <div style={{ fontSize:12, color:"#999", marginTop:2, lineHeight:1.5 }}>{task.notes}</div>}
                        </div>
                        <div style={{ borderLeft:"1px dashed #DDDDD8", padding:"9px 0 9px 12px", display:"flex", alignItems:"center" }}>
                          {dl && !task.done && <span style={{ fontSize:14, color:"#1A1A1A", whiteSpace:"nowrap" }}>{dl.label}</span>}
                        </div>
                        <div className="task-actions" style={{ display:"flex", gap:2, opacity:0, transition:"opacity 0.1s", alignItems:"center", paddingLeft:10 }}>
                          <button onClick={()=>openEdit(task)} style={{ background:"none", border:"none", color:"#AAA", cursor:"pointer", fontSize:13, padding:"2px 5px" }}>✎</button>
                          <button onClick={()=>removeTask(task.id)} style={{ background:"none", border:"none", color:"#CCC", cursor:"pointer", fontSize:13, padding:"2px 5px" }}>✕</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
                {tab==="open" && (
                  <button onClick={()=>openAdd(pid)} style={{ marginTop:6, background:"none", border:"1px dashed #DDD", borderRadius:5, padding:"7px 10px", color:"#CCC", fontSize:13, cursor:"pointer", width:"100%", textAlign:"left" }}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor="#AAA";e.currentTarget.style.color="#888";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor="#DDD";e.currentTarget.style.color="#CCC";}}>
                    + Add task
                  </button>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* Ctrl+K Command Palette */}
      {showCmdK && (() => {
        const allOpts = [{ id: null, label: "All Projects", color: "#2563EB", parentId: null }, ...orderedProjects];
        const filtered = allOpts.filter(p => p.label.toLowerCase().includes(cmdKQuery.toLowerCase()));
        const safeIdx = Math.min(cmdKIdx, filtered.length - 1);
        const choose = (id) => { navTo(id); setShowCmdK(false); setShowDatePalette(false); };
        const onKeyDown = (e) => {
          if (e.key === "ArrowDown") { e.preventDefault(); setCmdKIdx(i => Math.min(i + 1, filtered.length - 1)); }
          if (e.key === "ArrowUp")   { e.preventDefault(); setCmdKIdx(i => Math.max(i - 1, 0)); }
          if (e.key === "Enter" && filtered.length > 0) choose(filtered[safeIdx].id);
          if (e.key === "Escape") setShowCmdK(false);
        };
        return (
          <div onClick={e => e.target === e.currentTarget && setShowCmdK(false)}
            style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.35)", display:"flex", alignItems:"flex-start", justifyContent:"center", zIndex:200, paddingTop:120 }}>
            <div style={{ background:"#FFFFFF", borderRadius:10, width:"100%", maxWidth:420, boxShadow:"0 8px 40px rgba(0,0,0,0.18)", overflow:"hidden" }}>
              <div style={{ display:"flex", alignItems:"center", padding:"12px 16px", borderBottom:"1px solid #EEEEE8", gap:10 }}>
                <span style={{ fontSize:13, color:"#AAA" }}>⌘</span>
                <input autoFocus value={cmdKQuery}
                  onChange={e => { setCmdKQuery(e.target.value); setCmdKIdx(0); }}
                  onKeyDown={onKeyDown}
                  placeholder="Go to project…"
                  style={{ flex:1, border:"none", outline:"none", fontSize:15, color:"#1A1A1A", background:"transparent", fontFamily:"Arial, sans-serif" }}

              </div>
              <div style={{ maxHeight:280, overflowY:"auto" }}>
                {filtered.length === 0 && (
                  <div style={{ padding:"16px", fontSize:13, color:"#CCC", textAlign:"center" }}>No projects found</div>
                )}
                {filtered.map((p, i) => (
                  <div key={p.id ?? "__all__"} onClick={() => choose(p.id)}
                    style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 16px", cursor:"pointer",
                      background: i === safeIdx ? "#F0F4FF" : "transparent",
                      borderLeft: i === safeIdx ? "2px solid #2563EB" : "2px solid transparent" }}
                    onMouseEnter={() => setCmdKIdx(i)}>
                    <div style={{ width:8, height:8, borderRadius:"50%", background:p.color, flexShrink:0 }} />
                    <span style={{ fontSize:14, color:"#1A1A1A" }}>{p.label}</span>
                    {p.parentId && <span style={{ fontSize:11, color:"#BBB", marginLeft:"auto" }}>sub-project</span>}
                  </div>
                ))}
              </div>
              <div style={{ padding:"8px 16px", borderTop:"1px solid #EEEEE8", display:"flex", gap:16, fontSize:11, color:"#CCC" }}>
                <span>↑↓ navigate</span><span>↵ select</span><span>ESC close</span>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Date Palette — D key */}
      {showDatePalette && (() => {
        const curId = selectedTaskRef.current;
        const curTask = flatRef.current.find(t => t.id === curId);
        const submitDate = () => {
          const result = parseDateInput(datePaletteVal);
          if (!result.ok) return; // invalid — do nothing, keep open
          updateTask(curId, { deadline: result.iso });
          setShowDatePalette(false);
        };
        // Pre-fill hint: current deadline formatted as mm/dd/yy
        const hint = curTask?.deadline
          ? (() => { const d = new Date(curTask.deadline + "T00:00:00");
              return `${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}/${String(d.getFullYear()).slice(2)}`; })()
          : "";
        const parsed = datePaletteVal.trim() ? parseDateInput(datePaletteVal) : null;
        const isValid = !datePaletteVal.trim() || (parsed && parsed.ok);
        const previewLabel = parsed?.ok && parsed.iso
          ? deadlineInfo(parsed.iso)?.label || new Date(parsed.iso + "T00:00:00").toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" })
          : null;
        return (
          <div onClick={e => e.target === e.currentTarget && setShowDatePalette(false)}
            style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.35)", display:"flex", alignItems:"flex-start", justifyContent:"center", zIndex:200, paddingTop:120 }}>
            <div style={{ background:"#FFFFFF", borderRadius:10, width:"100%", maxWidth:360, boxShadow:"0 8px 40px rgba(0,0,0,0.18)", overflow:"hidden" }}>
              <div style={{ display:"flex", alignItems:"center", padding:"12px 16px", borderBottom:"1px solid #EEEEE8", gap:10 }}>
                <span style={{ fontSize:13, color:"#AAA" }}>📅</span>
                <input autoFocus value={datePaletteVal}
                  onChange={e => setDatePaletteVal(e.target.value)}
                  onKeyDown={e => {
                    if (e.key === "Enter") { e.preventDefault(); e.stopPropagation(); submitDate(); }
                    if (e.key === "Escape") { e.preventDefault(); e.stopPropagation(); setShowDatePalette(false); }
                  }}
                  placeholder={hint || "tomorrow · in 2 weeks · mm/dd/yy"}
                  style={{ flex:1, border:"none", outline:"none", fontSize:15, color:isValid?"#1A1A1A":"#CC2200",
                    background:"transparent", fontFamily:"Arial, sans-serif" }}
                />
                <span style={{ fontSize:11, color:"#CCC", background:"#F5F5F3", borderRadius:4, padding:"2px 6px" }}>ESC</span>
              </div>
              <div style={{ padding:"10px 16px", fontSize:13, minHeight:38, display:"flex", alignItems:"center", gap:6 }}>
                {previewLabel ? (
                  <>
                    <span style={{ color:"#2563EB", fontWeight:600 }}>→</span>
                    <span style={{ color:"#1A1A1A" }}>{previewLabel}</span>
                  </>
                ) : datePaletteVal.trim() && !isValid ? (
                  <span style={{ color:"#CC2200" }}>Can't parse that date</span>
                ) : curTask?.deadline ? (
                  <span style={{ color:"#AAA" }}>currently {deadlineInfo(curTask.deadline)?.label}</span>
                ) : (
                  <span style={{ color:"#CCC" }}>{curTask?.title}</span>
                )}
              </div>
              <div style={{ padding:"8px 16px", borderTop:"1px solid #EEEEE8", display:"flex", gap:16, fontSize:11, color:"#CCC" }}>
                <span>↵ save</span><span>empty = clear deadline</span><span>ESC cancel</span>
              </div>
            </div>
          </div>
        );
      })()}

      {/* New Project Modal */}
      {showNewProj && (
        <div onClick={e=>e.target===e.currentTarget&&setShowNewProj(false)}
          style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:100 }}>
          <div style={{ background:"#FFFFFF", border:"1px solid #DDDDD8", borderRadius:"14px 14px 0 0", padding:"22px 20px 36px", width:"100%", maxWidth:520, boxShadow:"0 -4px 24px rgba(0,0,0,0.08)" }}>
            <div style={{ fontSize:10, fontFamily:"Arial, sans-serif", color:"#AAA", letterSpacing:2, marginBottom:16 }}>NEW PROJECT</div>
            <div style={{ display:"flex", flexDirection:"column", gap:11 }}>
              <input autoFocus value={newProjName} onChange={e=>setNewProjName(e.target.value)}
                onKeyDown={e=>(e.key==="Enter"||e.key==="Enter"&&e.ctrlKey)&&createProject()}
                placeholder="Project name *"
                style={{ background:"#F5F5F3", border:"1px solid #DDDDD8", borderRadius:6, padding:"11px 12px", color:"#1A1A1A", fontSize:15 }} />
              <div>
                <div style={{ fontSize:10, fontFamily:"Arial, sans-serif", color:"#AAA", letterSpacing:1.5, marginBottom:8 }}>COLOR</div>
                <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                  {["#2563EB","#16A34A","#DC2626","#D97706","#7C3AED","#0891B2","#BE185D","#374151","#EA580C","#0D9488"].map(c=>(
                    <div key={c} onClick={()=>setNewProjColor(c)}
                      style={{ width:26, height:26, borderRadius:"50%", background:c, cursor:"pointer",

                        outlineOffset: newProjColor===c ? 2 : 0,
                        transform: newProjColor===c ? "scale(1.15)" : "scale(1)",
                        transition:"transform 0.1s" }} />
                  ))}
                </div>
              </div>
            </div>
            <div style={{ display:"flex", gap:8, marginTop:18 }}>
              <button onClick={()=>setShowNewProj(false)} style={{ flex:1, background:"#F5F5F3", border:"1px solid #DDDDD8", borderRadius:6, padding:"12px 0", color:"#888", fontSize:14, cursor:"pointer" }}>Cancel</button>
              <button onClick={createProject} style={{ flex:2, background:"#2563EB", border:"none", borderRadius:6, padding:"12px 0", color:"#fff", fontSize:14, cursor:"pointer", fontWeight:500 }}>Create Project</button>
            </div>
          </div>
        </div>
      )}

      {/* Shortcuts Help */}
      {showShortcuts && (
        <div onClick={()=>setShowShortcuts(false)}
          style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.35)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200 }}>
          <div style={{ background:"#FFFFFF", borderRadius:12, padding:"24px 28px", width:"100%", maxWidth:360, boxShadow:"0 8px 40px rgba(0,0,0,0.18)" }} onClick={e=>e.stopPropagation()}>
            <div style={{ fontSize:13, fontWeight:600, color:"#1A1A1A", marginBottom:16 }}>Keyboard Shortcuts</div>
            {[
              ["Ctrl K",      "Navigate to project"],
              ["N",           "New task"],
              ["P",           "New project"],
              ["Tab",         "Toggle Open / Done"],
              ["?",           "Show this help"],
              ["↓ / ↑",       "Select task"],
              ["D",           "Set deadline on selected task"],
              ["↵",           "Edit selected task"],
              ["Ctrl ↵",      "Save task / confirm"],
              ["Esc",         "Close any panel"],
            ].map(([key, label]) => (
              <div key={key} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 0", borderBottom:"1px solid #F0F0EC" }}>
                <span style={{ fontSize:13, color:"#555" }}>{label}</span>
                <span style={{ fontSize:11, color:"#888", background:"#F5F5F3", border:"1px solid #E0E0DC", borderRadius:5, padding:"3px 8px", fontFamily:"Arial, sans-serif", letterSpacing:0.5 }}>{key}</span>
              </div>
            ))}
            <div style={{ marginTop:14, fontSize:11, color:"#CCC", textAlign:"center" }}>Press ? or Esc to close</div>
          </div>
        </div>
      )}

      {/* Task Modal */}
      {showAdd && (
        <div onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}
          style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:100 }}>
          <div onKeyDown={e=>{ if(e.key==="Enter"&&e.ctrlKey){ e.preventDefault(); e.stopPropagation(); saveForm(); }}}
            style={{ background:"#FFFFFF", border:"1px solid #DDDDD8", borderRadius:"14px 14px 0 0", padding:"22px 20px 36px", width:"100%", maxWidth:520, boxShadow:"0 -4px 24px rgba(0,0,0,0.08)" }}>
            <div style={{ fontSize:10, fontFamily:"Arial, sans-serif", color:"#AAA", letterSpacing:2, marginBottom:16 }}>{editId?"EDIT TASK":"NEW TASK"}</div>
            <div style={{ display:"flex", flexDirection:"column", gap:11 }}>
              <input autoFocus value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))}
                onKeyDown={e=>(e.key==="Enter"||( e.key==="Enter"&&e.ctrlKey))&&saveForm()} placeholder="Task title *"
                style={{ background:"#F5F5F3", border:"1px solid #DDDDD8", borderRadius:6, padding:"11px 12px", color:"#1A1A1A", fontSize:15 }} />
              <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Notes (optional)" rows={2}
                onKeyDown={e=>e.key==="Enter"&&e.ctrlKey&&saveForm()}
                style={{ background:"#F5F5F3", border:"1px solid #DDDDD8", borderRadius:6, padding:"11px 12px", color:"#1A1A1A", fontSize:14, resize:"none" }} />
              <div>
                <div style={{ fontSize:10, fontFamily:"Arial, sans-serif", color:"#AAA", letterSpacing:1.5, marginBottom:5 }}>PROJECT</div>
                <select value={form.projectId} onChange={e=>setForm(f=>({...f,projectId:e.target.value}))}
                  style={{ width:"100%", background:"#F5F5F3", border:"1px solid #DDDDD8", borderRadius:6, padding:"10px 9px", color:"#1A1A1A", fontSize:14 }}>
                  {orderedProjects.map(p=><option key={p.id} value={p.id}>{p.parentId?`  ↳ ${p.label}`:p.label}</option>)}
                </select>
              </div>
              <div>
                <div style={{ fontSize:10, fontFamily:"Arial, sans-serif", color:"#AAA", letterSpacing:1.5, marginBottom:5 }}>DEADLINE (optional)</div>
                <input type="date" value={form.deadline} onChange={e=>setForm(f=>({...f,deadline:e.target.value}))}
                  style={{ background:"#F5F5F3", border:"1px solid #DDDDD8", borderRadius:6, padding:"10px 12px", color:form.deadline?"#1A1A1A":"#AAA", fontSize:14, width:"100%" }} />
              </div>
            </div>
            <div style={{ display:"flex", gap:8, marginTop:18 }}>
              <button onClick={()=>setShowAdd(false)} style={{ flex:1, background:"#F5F5F3", border:"1px solid #DDDDD8", borderRadius:6, padding:"12px 0", color:"#888", fontSize:14, cursor:"pointer" }}>Cancel</button>
              <button onClick={saveForm} style={{ flex:2, background:"#2563EB", border:"none", borderRadius:6, padding:"12px 0", color:"#fff", fontSize:14, cursor:"pointer", fontWeight:500 }}>{editId?"Save Changes":"Add Task"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/tasks/sw.js', { scope: '/tasks/' });
  });
}
</script>
</body>
</html>
