<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tasks</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; background: #0D0F14; color: #E8EAF0; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0D0F14; }
  ::-webkit-scrollbar-thumb { background: #1E2230; border-radius: 2px; }
  input, textarea, select, button { font-family: 'DM Sans', sans-serif; }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.4); cursor: pointer; }
  .task-row:hover { background: #131825 !important; }
  .task-row:hover .task-actions { opacity: 1 !important; }
  .proj-tab { transition: background 0.1s; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .proj-tab:hover { background: #131825 !important; }
  input:focus, textarea:focus, select:focus { border-color: #2563EB !important; }
  @media (max-width: 580px) {
    .sidebar { width: 150px !important; }
    .main-pad { padding: 12px !important; }
    .header-title { font-size: 12px !important; letter-spacing: 1px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const SUPA_URL = "https://grokfifjcocujtgmeunl.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb2tmaWZqY29jdWp0Z21ldW5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NjcwNjMsImV4cCI6MjA5MTQ0MzA2M30.yftLoF6FgQCz2zMZyKHLGQ7s5VQfnXj8akUj6R3ArDs";

const H = { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}`, "Content-Type": "application/json" };

async function sbFetch(path, opts = {}) {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, { headers: H, ...opts });
  if (!res.ok) { const t = await res.text(); throw new Error(t); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

const db = {
  getProjects: () => sbFetch("projects?select=*&order=sort_order.asc"),
  getTasks:    () => sbFetch("tasks?select=*&order=created_at.asc"),
  insertTask:  (t) => sbFetch("tasks", { method:"POST", body: JSON.stringify({
    id: t.id, project_id: t.projectId, title: t.title, notes: t.notes||"",
    deadline: t.deadline||null, priority: t.priority, done: t.done
  })}),
  updateTask: (id, fields) => {
    const mapped = {};
    if ("done"      in fields) mapped.done       = fields.done;
    if ("title"     in fields) mapped.title      = fields.title;
    if ("notes"     in fields) mapped.notes      = fields.notes;
    if ("deadline"  in fields) mapped.deadline   = fields.deadline || null;
    if ("priority"  in fields) mapped.priority   = fields.priority;
    if ("projectId" in fields) mapped.project_id = fields.projectId;
    return sbFetch(`tasks?id=eq.${id}`, { method:"PATCH", body: JSON.stringify(mapped) });
  },
  deleteTask: (id) => sbFetch(`tasks?id=eq.${id}`, { method:"DELETE" }),
};

function fromRow(r) {
  return { id: r.id, projectId: r.project_id, title: r.title, notes: r.notes||"", deadline: r.deadline||null, priority: r.priority, done: r.done, createdAt: r.created_at };
}

function fromProjRow(r) {
  return { id: r.id, label: r.label, color: r.color, parentId: r.parent_id||null, sortOrder: r.sort_order };
}

const PRIORITIES = {
  high:   { label:"High", dot:"#FF5C5C" },
  medium: { label:"Med",  dot:"#F5A623" },
  low:    { label:"Low",  dot:"#6B7280" },
};

function deadlineInfo(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + "T00:00:00");
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((d - now) / 86400000);
  const label = d.toLocaleDateString("en-US", { month:"short", day:"numeric" });
  if (diff < 0)   return { label:`${label} · overdue`, color:"#FF5C5C", urgent:true };
  if (diff === 0) return { label:"Due today",           color:"#FF5C5C", urgent:true };
  if (diff === 1) return { label:"Due tomorrow",        color:"#F5A623", urgent:false };
  if (diff <= 7)  return { label:`${label} · ${diff}d`, color:"#F5A623", urgent:false };
  return           { label,                             color:"#6B7280", urgent:false };
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function App() {
  const [projects, setProjects]     = useState([]);
  const [tasks, setTasks]           = useState([]);
  const [syncStatus, setSyncStatus] = useState("loading");
  const [activeProject, setActive]  = useState(null);
  const [showAdd, setShowAdd]       = useState(false);
  const [editId, setEditId]         = useState(null);
  const [form, setForm]             = useState({ title:"", notes:"", deadline:"", priority:"medium", projectId:"" });
  const [digest, setDigest]         = useState(null);
  const [digestLoading, setDL]      = useState(false);
  const [tab, setTab]               = useState("open");
  const [search, setSearch]         = useState("");
  const initialized                 = useRef(false);

  // ── Load ─────────────────────────────────────────────────────
  useEffect(() => {
    if (initialized.current) return;
    initialized.current = true;
    (async () => {
      try {
        const [pRows, tRows] = await Promise.all([db.getProjects(), db.getTasks()]);
        const projs = pRows.map(fromProjRow);
        setProjects(projs);
        setTasks(tRows.map(fromRow));
        if (projs.length) setForm(f => ({ ...f, projectId: projs[0].id }));
        setSyncStatus("ok");
      } catch(e) {
        setSyncStatus("error");
      }
    })();
  }, []);

  const flash = (s) => { setSyncStatus(s); if (s === "ok") {} };

  // ── CRUD ─────────────────────────────────────────────────────
  const addTask = async (task) => {
    setTasks(prev => [...prev, task]);
    try { flash("saving"); await db.insertTask(task); flash("ok"); }
    catch { flash("error"); }
  };

  const updateTask = async (id, fields) => {
    setTasks(prev => prev.map(t => t.id === id ? { ...t, ...fields } : t));
    try { flash("saving"); await db.updateTask(id, fields); flash("ok"); }
    catch { flash("error"); }
  };

  const removeTask = async (id) => {
    setTasks(prev => prev.filter(t => t.id !== id));
    try { flash("saving"); await db.deleteTask(id); flash("ok"); }
    catch { flash("error"); }
  };

  const openAdd = (projectId) => {
    const pid = projectId || activeProject || (projects[0]?.id ?? "");
    setForm({ title:"", notes:"", deadline:"", priority:"medium", projectId: pid });
    setEditId(null); setShowAdd(true);
  };

  const openEdit = (task) => {
    setForm({ title:task.title, notes:task.notes||"", deadline:task.deadline||"", priority:task.priority, projectId:task.projectId });
    setEditId(task.id); setShowAdd(true);
  };

  const saveForm = () => {
    if (!form.title.trim()) return;
    if (editId) {
      updateTask(editId, { ...form, title:form.title.trim(), deadline:form.deadline||null });
    } else {
      addTask({ id:genId(), ...form, title:form.title.trim(), deadline:form.deadline||null, done:false, createdAt:new Date().toISOString() });
    }
    setShowAdd(false);
  };

  // ── Derived ──────────────────────────────────────────────────
  const proj = (id) => projects.find(p => p.id === id);

  // Build ordered project list: top-level in order, each followed by its children
  const orderedProjects = [];
  const topLevel = projects.filter(p => !p.parentId);
  topLevel.forEach(p => {
    orderedProjects.push(p);
    projects.filter(c => c.parentId === p.id).forEach(c => orderedProjects.push(c));
  });

  const filtered = tasks.filter(t => {
    const inProject = !activeProject || t.projectId === activeProject;
    const inTab     = tab === "open" ? !t.done : t.done;
    const inSearch  = !search || t.title.toLowerCase().includes(search.toLowerCase());
    return inProject && inTab && inSearch;
  });

  const grouped = activeProject
    ? { [activeProject]: filtered }
    : orderedProjects.reduce((acc, p) => {
        const items = filtered.filter(t => t.projectId === p.id);
        if (items.length) acc[p.id] = items;
        return acc;
      }, {});

  const openCount   = tasks.filter(t => !t.done).length;
  const urgentCount = tasks.filter(t => !t.done && t.deadline && deadlineInfo(t.deadline)?.urgent).length;

  // ── Digest ───────────────────────────────────────────────────
  const runDigest = async () => {
    setDL(true); setDigest(null);
    const open = tasks.filter(t => !t.done);
    const summary = orderedProjects.map(p => {
      const pts = open.filter(t => t.projectId === p.id);
      if (!pts.length) return null;
      return `**${p.label}** (${pts.length} open)\n` + pts.map(t => {
        const dl = t.deadline ? deadlineInfo(t.deadline) : null;
        return `- [${t.priority.toUpperCase()}] ${t.title}${dl ? ` (${dl.label})` : ""}`;
      }).join("\n");
    }).filter(Boolean).join("\n\n");
    if (!summary) { setDigest("🎉 No open tasks. Everything is done."); setDL(false); return; }
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:1000,
          messages:[{ role:"user", content:`You are a sharp executive assistant giving a crisp daily briefing. Here are the open tasks:\n\n${summary}\n\nGive a concise summary: start with what's most urgent (overdue/due soon), then flag any high-priority items, then give a quick project-by-project rundown. Be direct and brief — this is a scan, not a report. Use plain text, no markdown headers, keep it under 200 words.` }]
        })
      });
      const data = await res.json();
      setDigest(data.content?.[0]?.text || "No response.");
    } catch { setDigest("Couldn't reach AI."); }
    setDL(false);
  };

  const syncLabel = { loading:"⟳ connecting", saving:"⟳ saving", ok:"✓ synced", error:"✕ sync error" };
  const syncColor = { loading:"#555", saving:"#F5A623", ok:"#00C2A8", error:"#FF5C5C" };

  // ── Render ────────────────────────────────────────────────────
  if (syncStatus === "loading") return (
    <div style={{ height:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#0D0F14" }}>
      <div style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:"#333", letterSpacing:2 }}>LOADING…</div>
    </div>
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh" }}>

      {/* Header */}
      <div style={{ borderBottom:"1px solid #1A1D28", padding:"0 16px", display:"flex", alignItems:"center", justifyContent:"space-between", height:52, flexShrink:0, background:"#0D0F14", position:"sticky", top:0, zIndex:50 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, minWidth:0, overflow:"hidden" }}>
          <span className="header-title" style={{ fontFamily:"'DM Mono',monospace", fontWeight:500, fontSize:14, letterSpacing:2, color:"#C8CAD8", flexShrink:0 }}>TASKS</span>
          {openCount > 0 && <span style={{ background:"#1A1D28", borderRadius:20, padding:"1px 7px", fontSize:11, fontFamily:"'DM Mono',monospace", color:"#555", flexShrink:0 }}>{openCount}</span>}
          {urgentCount > 0 && <span style={{ background:"rgba(255,92,92,0.08)", border:"1px solid rgba(255,92,92,0.25)", borderRadius:20, padding:"1px 7px", fontSize:11, fontFamily:"'DM Mono',monospace", color:"#FF5C5C", flexShrink:0 }}>⚠ {urgentCount}</span>}
          <span style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:syncColor[syncStatus], flexShrink:0 }}>{syncLabel[syncStatus]}</span>
        </div>
        <div style={{ display:"flex", gap:8, flexShrink:0 }}>
          <button onClick={runDigest} disabled={digestLoading}
            style={{ background:"transparent", border:"1px solid #1E2230", borderRadius:6, padding:"5px 10px", color:"#555", fontSize:11, cursor:"pointer", fontFamily:"'DM Mono',monospace", letterSpacing:1 }}>
            {digestLoading ? "···" : "⚡ DIGEST"}
          </button>
          <button onClick={() => openAdd()}
            style={{ background:"#2563EB", border:"none", borderRadius:6, padding:"6px 14px", color:"#fff", fontSize:12, cursor:"pointer", fontWeight:500 }}>
            + Add
          </button>
        </div>
      </div>

      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>

        {/* Sidebar */}
        <div className="sidebar" style={{ width:185, borderRight:"1px solid #1A1D28", padding:"12px 0", flexShrink:0, overflowY:"auto" }}>
          <div style={{ padding:"0 12px 6px", fontSize:9, fontFamily:"'DM Mono',monospace", color:"#333", letterSpacing:2 }}>PROJECTS</div>

          {/* All */}
          <div className="proj-tab" onClick={() => setActive(null)}
            style={{ padding:"7px 12px", background:activeProject===null?"#131825":"transparent", borderLeft:`2px solid ${activeProject===null?"#4B8BFF":"transparent"}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <div style={{ width:5, height:5, borderRadius:"50%", background:"#333" }} />
              <span style={{ fontSize:12, color:activeProject===null?"#D0D4E0":"#666", fontWeight:activeProject===null?500:400 }}>All</span>
            </div>
            {tasks.filter(t=>!t.done).length > 0 && <span style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:"#333" }}>{tasks.filter(t=>!t.done).length}</span>}
          </div>

          {orderedProjects.map(p => {
            const isSub = !!p.parentId;
            const count = tasks.filter(t => !t.done && t.projectId === p.id).length;
            const active = activeProject === p.id;
            return (
              <div key={p.id} className="proj-tab" onClick={() => setActive(p.id)}
                style={{ padding:isSub?"5px 12px 5px 24px":"7px 12px", background:active?"#131825":"transparent", borderLeft:`2px solid ${active?p.color:"transparent"}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  {isSub && <span style={{ color:"#2A2D38", fontSize:10 }}>└</span>}
                  <div style={{ width:isSub?4:5, height:isSub?4:5, borderRadius:"50%", background:p.color, flexShrink:0 }} />
                  <span style={{ fontSize:isSub?11:12, color:active?"#D0D4E0":(isSub?"#555":"#666"), fontWeight:active?500:400, lineHeight:1.3 }}>{p.label}</span>
                </div>
                {count > 0 && <span style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:"#333" }}>{count}</span>}
              </div>
            );
          })}

          <div style={{ margin:"12px 12px 0", height:1, background:"#1A1D28" }} />
          <div style={{ padding:"10px 12px 0", display:"flex", gap:3 }}>
            {["open","done"].map(t => (
              <button key={t} onClick={() => setTab(t)}
                style={{ flex:1, background:tab===t?"#1A1D28":"transparent", border:"none", borderRadius:4, padding:"5px 0", fontSize:10, fontFamily:"'DM Mono',monospace", color:tab===t?"#C8CAD8":"#3A3D48", cursor:"pointer", letterSpacing:1 }}>
                {t.toUpperCase()}
              </button>
            ))}
          </div>
        </div>

        {/* Main */}
        <div className="main-pad" style={{ flex:1, overflowY:"auto", padding:"16px 18px" }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…"
            style={{ width:"100%", maxWidth:280, background:"#131825", border:"1px solid #1A1D28", borderRadius:6, padding:"7px 11px", color:"#C8CAD8", fontSize:12, marginBottom:16, display:"block", outline:"none" }} />

          {digest && (
            <div style={{ background:"#0A1020", border:"1px solid #1A3050", borderRadius:8, padding:"14px 16px", marginBottom:18, position:"relative" }}>
              <div style={{ fontSize:9, fontFamily:"'DM Mono',monospace", color:"#4B8BFF", letterSpacing:2, marginBottom:8 }}>⚡ DAILY DIGEST</div>
              <div style={{ fontSize:13, color:"#8A9AB8", lineHeight:1.75, whiteSpace:"pre-wrap" }}>{digest}</div>
              <button onClick={()=>setDigest(null)} style={{ position:"absolute", top:10, right:12, background:"none", border:"none", color:"#333", cursor:"pointer", fontSize:18 }}>×</button>
            </div>
          )}

          {Object.keys(grouped).length === 0 && (
            <div style={{ textAlign:"center", paddingTop:60, color:"#2A2D38", fontFamily:"'DM Mono',monospace", fontSize:11, letterSpacing:2 }}>
              {tab==="done" ? "NO COMPLETED TASKS" : "NO OPEN TASKS"}
              {tab==="open" && <div style={{ marginTop:12 }}><button onClick={()=>openAdd()} style={{ background:"none", border:"1px dashed #1E2230", borderRadius:6, padding:"8px 16px", color:"#3A3D48", fontSize:12, cursor:"pointer" }}>+ Add your first task</button></div>}
            </div>
          )}

          {Object.entries(grouped).map(([pid, items]) => {
            const p = proj(pid);
            const sorted = [...items].sort((a,b) => {
              const pri = {high:0,medium:1,low:2};
              if (!a.deadline && !b.deadline) return pri[a.priority]-pri[b.priority];
              if (!a.deadline) return 1; if (!b.deadline) return -1;
              return new Date(a.deadline)-new Date(b.deadline);
            });
            return (
              <div key={pid} style={{ marginBottom:26 }}>
                {!activeProject && (
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                    <div style={{ width:6, height:6, borderRadius:"50%", background:p?.color }} />
                    <span style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:"#444", letterSpacing:1.5 }}>{p?.label?.toUpperCase()}</span>
                    <div style={{ flex:1, height:1, background:"#1A1D28" }} />
                    <button onClick={()=>openAdd(pid)} style={{ background:"none", border:"none", color:"#333", cursor:"pointer", fontSize:18, lineHeight:1, padding:"0 4px" }}
                      onMouseEnter={e=>e.target.style.color="#888"} onMouseLeave={e=>e.target.style.color="#333"}>+</button>
                  </div>
                )}
                <div style={{ display:"flex", flexDirection:"column", gap:1 }}>
                  {sorted.map(task => {
                    const dl = task.deadline ? deadlineInfo(task.deadline) : null;
                    const pdot = PRIORITIES[task.priority];
                    return (
                      <div key={task.id} className="task-row" style={{ display:"flex", alignItems:"flex-start", gap:10, padding:"9px 8px", borderRadius:6, background:"transparent", position:"relative" }}>
                        <div onClick={()=>updateTask(task.id,{done:!task.done})}
                          style={{ width:15, height:15, borderRadius:3, border:`1.5px solid ${task.done?"#2563EB":"#2A2D38"}`, background:task.done?"#2563EB":"transparent", flexShrink:0, marginTop:2, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.1s" }}>
                          {task.done && <span style={{ color:"#fff", fontSize:9, fontWeight:700 }}>✓</span>}
                        </div>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ display:"flex", alignItems:"center", gap:7, flexWrap:"wrap" }}>
                            <span style={{ fontSize:13, color:task.done?"#3A3D48":"#C8CAD8", textDecoration:task.done?"line-through":"none" }}>{task.title}</span>
                            <div style={{ width:4, height:4, borderRadius:"50%", background:task.done?"#2A2D38":pdot.dot, flexShrink:0 }} />
                            {dl && !task.done && <span style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:dl.color }}>{dl.label}</span>}
                          </div>
                          {task.notes && <div style={{ fontSize:11, color:"#3A4050", marginTop:2, lineHeight:1.5 }}>{task.notes}</div>}
                        </div>
                        <div className="task-actions" style={{ display:"flex", gap:2, opacity:0, flexShrink:0, transition:"opacity 0.1s" }}>
                          <button onClick={()=>openEdit(task)} style={{ background:"none", border:"none", color:"#444", cursor:"pointer", fontSize:12, padding:"2px 5px" }}>✎</button>
                          <button onClick={()=>removeTask(task.id)} style={{ background:"none", border:"none", color:"#3A3D48", cursor:"pointer", fontSize:12, padding:"2px 5px" }}>✕</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
                {activeProject && tab==="open" && (
                  <button onClick={()=>openAdd(pid)} style={{ marginTop:6, background:"none", border:"1px dashed #1A1D28", borderRadius:5, padding:"6px 10px", color:"#2A2D38", fontSize:12, cursor:"pointer", width:"100%", textAlign:"left" }}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor="#333";e.currentTarget.style.color="#555";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor="#1A1D28";e.currentTarget.style.color="#2A2D38";}}>
                    + Add task
                  </button>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* Modal — slides up from bottom on mobile */}
      {showAdd && (
        <div onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}
          style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:100 }}>
          <div style={{ background:"#0F1218", border:"1px solid #1A1D28", borderRadius:"14px 14px 0 0", padding:"20px 20px 32px", width:"100%", maxWidth:520 }}>
            <div style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:"#444", letterSpacing:2, marginBottom:16 }}>{editId?"EDIT TASK":"NEW TASK"}</div>
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              <input autoFocus value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))}
                onKeyDown={e=>e.key==="Enter"&&saveForm()} placeholder="Task title *"
                style={{ background:"#0D0F14", border:"1px solid #1A1D28", borderRadius:6, padding:"10px 12px", color:"#E8EAF0", fontSize:15, outline:"none" }} />
              <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Notes (optional)" rows={2}
                style={{ background:"#0D0F14", border:"1px solid #1A1D28", borderRadius:6, padding:"10px 12px", color:"#E8EAF0", fontSize:13, resize:"none", outline:"none" }} />
              <div style={{ display:"flex", gap:8 }}>
                <div style={{ flex:3 }}>
                  <div style={{ fontSize:9, fontFamily:"'DM Mono',monospace", color:"#333", letterSpacing:1.5, marginBottom:4 }}>PROJECT</div>
                  <select value={form.projectId} onChange={e=>setForm(f=>({...f,projectId:e.target.value}))}
                    style={{ width:"100%", background:"#0D0F14", border:"1px solid #1A1D28", borderRadius:6, padding:"9px 9px", color:"#C8CAD0", fontSize:13, outline:"none" }}>
                    {orderedProjects.map(p=><option key={p.id} value={p.id}>{p.parentId?`  ↳ ${p.label}`:p.label}</option>)}
                  </select>
                </div>
                <div style={{ flex:2 }}>
                  <div style={{ fontSize:9, fontFamily:"'DM Mono',monospace", color:"#333", letterSpacing:1.5, marginBottom:4 }}>PRIORITY</div>
                  <select value={form.priority} onChange={e=>setForm(f=>({...f,priority:e.target.value}))}
                    style={{ width:"100%", background:"#0D0F14", border:"1px solid #1A1D28", borderRadius:6, padding:"9px 9px", color:"#C8CAD0", fontSize:13, outline:"none" }}>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                  </select>
                </div>
              </div>
              <div>
                <div style={{ fontSize:9, fontFamily:"'DM Mono',monospace", color:"#333", letterSpacing:1.5, marginBottom:4 }}>DEADLINE (optional)</div>
                <input type="date" value={form.deadline} onChange={e=>setForm(f=>({...f,deadline:e.target.value}))}
                  style={{ background:"#0D0F14", border:"1px solid #1A1D28", borderRadius:6, padding:"9px 12px", color:form.deadline?"#C8CAD0":"#444", fontSize:13, colorScheme:"dark", width:"100%", outline:"none" }} />
              </div>
            </div>
            <div style={{ display:"flex", gap:8, marginTop:18 }}>
              <button onClick={()=>setShowAdd(false)} style={{ flex:1, background:"transparent", border:"1px solid #1A1D28", borderRadius:6, padding:"11px 0", color:"#555", fontSize:14, cursor:"pointer" }}>Cancel</button>
              <button onClick={saveForm} style={{ flex:2, background:"#2563EB", border:"none", borderRadius:6, padding:"11px 0", color:"#fff", fontSize:14, cursor:"pointer", fontWeight:500 }}>{editId?"Save Changes":"Add Task"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
